// ─── Kleurpalet & stijl ───────────────────────────────────────────────────────
const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0b1220;
    --panel: #111c2e;
    --panel2: #162035;
    --border: #1e3a5f;
    --accent: #00c8ff;
    --accent2: #00ff9d;
    --warn: #ffb347;
    --danger: #ff4d6d;
    --text: #d0e4f7;
    --muted: #5a7a9a;
    --bulk: #00ff9d;
    --nobulk: #ff4d6d;
    --grid: rgba(0,200,255,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    color: var(--accent); text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 4px 10px;
  }
  .header-title {
    font-size: 15px; font-weight: 600;
    color: var(--text);
  }
  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
    margin-left: auto;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }
  .status-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--accent2);
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    padding: 0 24px;
  }
  .tab {
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--accent); }
  .tab.active {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
  }

  /* Layout */
  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* Kaart tab */
  .map-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
  .sidebar {
    background: var(--panel); border: 1px solid var(--border);
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--accent);
    text-transform: uppercase; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
  }
  .filter-select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    width: 100%;
  }
  .filter-select:focus { outline: 1px solid var(--accent); }

  .map-container {
    background: var(--panel); border: 1px solid var(--border);
    position: relative; overflow: hidden;
    min-height: 520px;
  }
  .map-placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 520px; gap: 12px;
  }
  .map-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .map-canvas { width: 100%; height: 520px; }

  /* Object kaarten */
  .object-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px; margin-top: 16px;
  }
  .object-card {
    background: var(--panel2); border: 1px solid var(--border);
    padding: 14px; cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .object-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .object-card.bulk::before { background: var(--bulk); }
  .object-card.nobulk::before { background: var(--nobulk); }
  .object-card.mixed::before { background: var(--warn); }
  .object-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .object-card-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 6px;
  }
  .object-card-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .object-card-count {
    font-family: 'DM Mono', monospace;
    font-size: 20px; font-weight: 500; color: var(--accent);
  }
  .object-card-label { font-size: 10px; color: var(--muted); }
  .bulk-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; font-size: 10px;
    font-family: 'DM Mono', monospace; letter-spacing: 1px;
    margin-top: 8px;
  }
  .bulk-badge.bulk { color: var(--bulk); border: 1px solid var(--bulk); }
  .bulk-badge.nobulk { color: var(--nobulk); border: 1px solid var(--nobulk); }
  .bulk-badge.mixed { color: var(--warn); border: 1px solid var(--warn); }

  /* Decompositie tab */
  .decomp-layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
  .tree-panel {
    background: var(--panel); border: 1px solid var(--border); padding: 16px;
  }
  .tree-node {
    padding: 6px 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px;
    border-left: 2px solid transparent;
    transition: all 0.15s; margin: 2px 0;
  }
  .tree-node:hover { border-left-color: var(--accent); color: var(--accent); }
  .tree-node.selected { border-left-color: var(--accent); color: var(--accent); background: rgba(0,200,255,0.05); }
  .tree-node.child { padding-left: 24px; font-size: 10px; color: var(--muted); }
  .tree-node.child:hover, .tree-node.child.selected { color: var(--accent2); border-left-color: var(--accent2); }
  .tree-node.grandchild { padding-left: 44px; font-size: 10px; color: var(--muted); }

  .attr-panel {
    background: var(--panel); border: 1px solid var(--border); padding: 20px;
  }
  .attr-header {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .attr-title { font-size: 18px; font-weight: 700; }
  .attr-sub {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 1px;
  }

  .axis-section { margin-bottom: 24px; }
  .axis-title {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; color: var(--accent); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .axis-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .attr-row {
    display: grid; grid-template-columns: 180px 1fr 80px 100px;
    gap: 8px; align-items: center;
    padding: 8px 10px; margin-bottom: 4px;
    background: var(--panel2); border: 1px solid var(--border);
  }
  .attr-row:hover { border-color: var(--border); }
  .attr-name { font-size: 12px; font-weight: 500; }
  .attr-values {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .attr-value {
    font-family: 'DM Mono', monospace; font-size: 9px;
    padding: 2px 6px; border: 1px solid var(--border);
    color: var(--muted);
  }
  .attr-value.dominant {
    border-color: var(--accent); color: var(--accent);
  }
  .attr-count {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); text-align: right;
  }
  .bulk-toggle {
    display: flex; gap: 4px; justify-content: flex-end;
  }
  .btn-bulk {
    padding: 3px 8px; font-size: 9px;
    font-family: 'DM Mono', monospace; letter-spacing: 1px;
    cursor: pointer; border: 1px solid; background: none;
    transition: all 0.15s;
  }
  .btn-bulk.bulk { border-color: var(--bulk); color: var(--bulk); }
  .btn-bulk.bulk.active { background: var(--bulk); color: var(--bg); }
  .btn-bulk.nobulk { border-color: var(--nobulk); color: var(--nobulk); }
  .btn-bulk.nobulk.active { background: var(--nobulk); color: var(--bg); }

  /* Analyse tab */
  .analyse-layout { display: flex; flex-direction: column; gap: 16px; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .chart-panel {
    background: var(--panel); border: 1px solid var(--border); padding: 20px;
  }
  .chart-title {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; color: var(--accent); text-transform: uppercase;
    margin-bottom: 4px;
  }
  .chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

  .bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text); width: 120px; flex-shrink: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1; height: 20px; background: var(--panel2);
    border: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .bar-fill {
    height: 100%; transition: width 0.8s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .bar-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 100%);
  }
  .bar-value {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); width: 36px; text-align: right;
  }

  /* Scatter / matrix */
  .matrix {
    display: grid; gap: 4px;
  }
  .matrix-cell {
    padding: 8px; text-align: center;
    font-family: 'DM Mono', monospace; font-size: 10px;
    border: 1px solid var(--border); cursor: pointer;
    transition: all 0.2s;
  }
  .matrix-cell:hover { border-color: var(--accent); }
  .matrix-header { color: var(--muted); background: var(--panel2); }
  .matrix-count { font-size: 16px; font-weight: 700; }

  /* Detail panel */
  .detail-panel {
    background: var(--panel2); border: 1px solid var(--accent);
    padding: 16px; margin-top: 16px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }
  .detail-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 12px; }
  .detail-item { display: flex; flex-direction: column; gap: 4px; }
  .detail-key {
    font-family: 'DM Mono', monospace; font-size: 9px;
    color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }
  .detail-val { font-size: 12px; font-weight: 500; }

  /* Loading */
  .loading {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent);
  }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stat rij bovenaan */
  .stat-row {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--panel); border: 1px solid var(--border);
    padding: 16px; position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; top: 0; right: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(0,200,255,0.08) 0%, transparent 70%);
  }
  .stat-num {
    font-family: 'DM Mono', monospace; font-size: 28px;
    font-weight: 500; color: var(--accent); line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Tags */
  .tag {
    display: inline-block; padding: 2px 8px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid var(--border); color: var(--muted);
    margin: 2px;
  }
  .tag.context { border-color: var(--warn); color: var(--warn); }
  .tag.rams { border-color: var(--accent2); color: var(--accent2); }
  .tag.func { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* SVG kaart stijl */
  .map-svg { width: 100%; height: 520px; }
  .map-point { cursor: pointer; transition: r 0.2s; }
  .map-point:hover { r: 7; }
  .map-tooltip {
    position: absolute; background: var(--panel);
    border: 1px solid var(--accent); padding: 10px 14px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    pointer-events: none; z-index: 10;
    min-width: 180px;
  }
  .map-tooltip-title { color: var(--accent); font-size: 12px; margin-bottom: 6px; }
  .map-tooltip-row { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); }
  .map-tooltip-val { color: var(--text); }
`;

// PDOK collecties per IMWA objecttype
const PDOK_COLLECTIES = {
  stuw:          "stuw",
  gemaal:        "gemaal",
  duiker:        "duiker",
  sifon:         "sifon",
  hevel:         "hevel",
  brug:          "brug",
  sluis:         "sluis",
  afsluitmiddel: "afsluitmiddel",
  vispassage:    "vispassage",
  vastedam:      "vastedam",
};

const PDOK_BASE = "https://api.pdok.nl/hwh/waterschappen-kunstwerken-imwa/ogc/v1/collections";

function detectType(collectie) {
  const map = {
    stuw: "stuw", gemaal: "gemaal", duiker: "duiker", sifon: "duiker", hevel: "duiker",
    brug: "brug", sluis: "sluis", afsluitmiddel: "afsluitmiddel",
    vispassage: "vispassage", vastedam: "vastedam",
  };
  return map[collectie] || collectie;
}

function LeafletKaart({ typeFilter, setTypeFilter, bronhouder, setBronhouder }) {
  const mapRef = useRef(null);
  const leafletMap = useRef(null);
  const markersLayer = useRef(null);
  const [status, setStatus] = useState("idle");
  const [stats, setStats] = useState({});
  const [selected, setSelected] = useState(null);
  const [totaal, setTotaal] = useState(0);
  const [actieveCollectie, setActieveCollectie] = useState(null);

  const bron = BRONHOUDERS[bronhouder];

  // Initialiseer Leaflet kaart
  useEffect(() => {
    if (leafletMap.current) return;
    const map = L.map(mapRef.current, {
      center: bron.center, zoom: bron.zoom, zoomControl: true,
    });
    leafletMap.current = map;

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: "abcd", maxZoom: 19,
    }).addTo(map);

    markersLayer.current = L.layerGroup().addTo(map);

    return () => {
      map.remove();
      leafletMap.current = null;
    };
  }, []);

  const abortRef = useRef(null);

  async function fetchCollectie(collectieNaam) {
    // Annuleer vorige request
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    const signal = abortRef.current.signal;

    setStatus("loading");
    setSelected(null);
    setActieveCollectie(collectieNaam);
    markersLayer.current.clearLayers();
    setStats({});
    setTotaal(0);

    const type = detectType(collectieNaam);
    const kleur = TYPE_COLORS[type] || "#888";

    try {
      // Ophalen met bbox filter op beheergebied + paginatie
      let allFeatures = [];
      let url = `${PDOK_BASE}/${collectieNaam}/items?f=json&limit=1000&bbox=${bron.bbox}`;
      let paginas = 0;

      while (url && paginas < 5) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const features = data.features || [];
        allFeatures = allFeatures.concat(features);
        paginas++;

        // Volgende pagina via next link
        const nextLink = (data.links || []).find(l => l.rel === "next");
        url = nextLink ? nextLink.href : null;
      }

      // Centreer kaart
      leafletMap.current.setView(bron.center, bron.zoom);

      let geldig = 0;
      allFeatures.forEach(f => {
        if (!f.geometry) return;
        const coords = f.geometry.type === "Point"
          ? f.geometry.coordinates
          : f.geometry.coordinates[0];
        if (!coords || coords.length < 2) return;

        const props = f.properties || {};
        const naam = props.naam || props.lokaalid || props.code || f.id || "Onbekend";
        const lat = coords[1], lon = coords[0];
        if (lat < 50 || lat > 54 || lon < 3 || lon > 8) return; // buiten NL overslaan

        geldig++;

        const marker = L.circleMarker([lat, lon], {
          radius: 6,
          fillColor: kleur,
          color: "#0b1220",
          weight: 1.5,
          opacity: 1,
          fillOpacity: 0.85,
        });

        marker.on("click", () => setSelected({ naam, type, props, coords: [lon, lat] }));
        marker.bindTooltip(
          `<div style="font-family:monospace;font-size:11px;background:#111c2e;color:#d0e4f7;border:1px solid #1e3a5f;padding:6px 10px">
            <b style="color:${kleur}">${naam}</b><br/>Type: ${type}
          </div>`,
          { className: "leaflet-tooltip-damo", sticky: true }
        );
        markersLayer.current.addLayer(marker);
      });

      setStats({ [type]: geldig });
      setTotaal(geldig);
      setStatus("success");

      // Zoom naar markers als er zijn
      if (geldig > 0) {
        try { leafletMap.current.fitBounds(markersLayer.current.getBounds(), { padding: [40, 40] }); }
        catch(e) {}
      }

    } catch (err) {
      if (err.name === "AbortError") return; // Gewoon geannuleerd
      console.error("PDOK fout:", err);
      setStatus("error");
    }
  }

  return (
    <div>
      {/* Stat rij */}
      <div className="stat-row">
        <div className="stat-card">
          <div className="stat-num" style={{ fontSize: 22 }}>{totaal.toLocaleString("nl")}</div>
          <div className="stat-label">Objecten geladen via PDOK</div>
        </div>
        <div className="stat-card">
          <div className="stat-num" style={{ fontSize: 22 }}>{Object.keys(stats).length}</div>
          <div className="stat-label">Objecttypen gevonden</div>
        </div>
        <div className="stat-card" style={{ gridColumn: "span 2" }}>
          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--accent)", letterSpacing: 2, marginBottom: 4 }}>
            // DATABRON
          </div>
          <div style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--text)" }}>
            PDOK · Waterschappen Kunstwerken IMWA
          </div>
          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", marginTop: 2 }}>
            Filter: bbox beheergebied {bronhouder}
          </div>
          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)" }}>
            api.pdok.nl/hwh/waterschappen-kunstwerken-imwa/ogc/v1
          </div>
        </div>
      </div>

      <div className="map-layout">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-title">// Databron</div>
          <div className="filter-group">
            <div className="filter-label">BRONHOUDER (WATERSCHAP)</div>
            <select className="filter-select" value={bronhouder}
              onChange={e => { setBronhouder(e.target.value); markersLayer.current && markersLayer.current.clearLayers(); setTotaal(0); setStats({}); setStatus("idle"); }}>
              {Object.entries(BRONHOUDERS).map(([code, info]) => (
                <option key={code} value={code}>{code} – {info.label.split(" (")[0]}</option>
              ))}
            </select>
          </div>

          <div className="filter-group" style={{ marginTop: 12 }}>
            <div className="filter-label">OBJECTTYPE LADEN VAN PDOK</div>
            {Object.entries(PDOK_COLLECTIES).map(([type, collectie]) => (
              <button key={type} onClick={() => fetchCollectie(collectie)}
                style={{
                  display: "flex", alignItems: "center", gap: 8,
                  width: "100%", background: actieveCollectie === collectie ? "rgba(0,200,255,0.1)" : "none",
                  border: actieveCollectie === collectie ? "1px solid var(--accent)" : "1px solid var(--border)",
                  color: actieveCollectie === collectie ? "var(--accent)" : "var(--muted)",
                  padding: "6px 10px", cursor: "pointer", marginBottom: 4,
                  fontFamily: "DM Mono", fontSize: 10, letterSpacing: 1, textAlign: "left",
                }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: TYPE_COLORS[type] || "#888", flexShrink: 0 }} />
                {type.toUpperCase()}
                {actieveCollectie === collectie && totaal > 0 && (
                  <span style={{ marginLeft: "auto", color: "var(--accent)" }}>{totaal}</span>
                )}
              </button>
            ))}
          </div>

          {/* Legenda */}
          {Object.entries(stats).length > 0 && (
            <div style={{ marginTop: 12 }}>
              <div className="sidebar-title">// Geladen</div>
              {Object.entries(stats).map(([type, count]) => (
                <div key={type} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: TYPE_COLORS[type] || "#888", flexShrink: 0 }} />
                  <span style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--muted)" }}>{type}</span>
                  <span style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--accent)", marginLeft: "auto" }}>{count}</span>
                </div>
              ))}
            </div>
          )}

          {/* Status */}
          <div style={{ marginTop: "auto", paddingTop: 16, borderTop: "1px solid var(--border)" }}>
            {status === "idle" && (
              <div style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--muted)" }}>
                ← Kies een objecttype om te laden
              </div>
            )}
            {status === "loading" && (
              <div className="loading"><div className="spinner" />PDOK data ophalen...</div>
            )}
            {status === "success" && (
              <div style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--accent2)" }}>
                ✓ {totaal} objecten geladen
              </div>
            )}
            {status === "error" && (
              <div style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--danger)" }}>
                ✗ PDOK fout — controleer console
              </div>
            )}
            <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", marginTop: 6 }}>
              Kaart: CartoDB Dark Matter<br/>
              Data: PDOK OGC API Features v1
            </div>
          </div>
        </div>

        {/* Leaflet kaart */}
        <div style={{ position: "relative" }}>
          <div ref={mapRef} style={{ height: 520, border: "1px solid var(--border)" }} />
          <div style={{
            position: "absolute", bottom: 8, left: 8, zIndex: 1000,
            background: "rgba(11,18,32,0.85)", border: "1px solid var(--border)",
            padding: "4px 10px", fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)",
          }}>
            Bron: PDOK · Gegevensknooppunt Waterschappen · Bronhouder {bronhouder} · IMWA Kunstwerken
          </div>
        </div>
      </div>

      {/* Detail panel */}
      {selected && (
        <div className="detail-panel">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontFamily: "DM Mono", fontSize: 11, color: "var(--accent)", letterSpacing: 2 }}>
              // OBJECT DETAIL · PDOK LIVE
            </div>
            <button onClick={() => setSelected(null)} style={{
              background: "none", border: "1px solid var(--border)",
              color: "var(--muted)", padding: "2px 8px", cursor: "pointer",
              fontFamily: "DM Mono", fontSize: 10
            }}>SLUIT</button>
          </div>
          <div className="detail-grid" style={{ marginTop: 12 }}>
            <div className="detail-item">
              <div className="detail-key">Naam / ID</div>
              <div className="detail-val">{selected.naam}</div>
            </div>
            <div className="detail-item">
              <div className="detail-key">Type (IMWA)</div>
              <div className="detail-val" style={{ color: TYPE_COLORS[selected.type] || "#888" }}>{selected.type}</div>
            </div>
            <div className="detail-item">
              <div className="detail-key">Bronhouder</div>
              <div className="detail-val">{bronhouder} · {bron.label}</div>
            </div>
            <div className="detail-item">
              <div className="detail-key">Coördinaten</div>
              <div className="detail-val" style={{ fontFamily: "DM Mono", fontSize: 11 }}>
                {selected.coords[1].toFixed(5)}, {selected.coords[0].toFixed(5)}
              </div>
            </div>
            <div className="detail-item">
              <div className="detail-key">Identificatie</div>
              <div className="detail-val" style={{ fontFamily: "DM Mono", fontSize: 10, wordBreak: "break-all" }}>
                {selected.props.lokaalid || selected.props.identificatie || selected.props.id || "—"}
              </div>
            </div>
            <div className="detail-item">
              <div className="detail-key">Databron</div>
              <div className="detail-val"><span className="tag func">PDOK · IMWA 2.6</span></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    sluitpeil:          { pct:  10, waarden: ["1.86"] },
  },
  put: {
    typeput:            { pct:  90, waarden: ["ontvangstput"] },
  },
};

const PDOK_BASE_ATTR = "https://api.pdok.nl/hwh/waterschappen-kunstwerken-imwa/ogc/v1/collections";
const AGV_WB = "Waterschap Amstel, Gooi en Vecht";
const AGV_BBOX = "4.65,52.10,5.25,52.55";

function DecompositieTab() {
  const [selected, setSelected] = useState("stuw");
  const [clusterAttrs, setClusterAttrs] = useState({});
  const [waardeStatus, setWaardeStatus] = useState({});
  const [contextAttrs, setContextAttrs] = useState({ stuw: DEFAULT_CONTEXT_ATTRS.map(a => ({ ...a, values: a.values.map(v => ({ ...v })) })) });
  const [ramsAttrs, setRamsAttrs] = useState({ stuw: DEFAULT_RAMS_ATTRS.map(a => ({ ...a, values: a.values.map(v => ({ ...v })) })) });
  const [newAttr, setNewAttr] = useState({ ctx: { name: "", waarden: "" }, rams: { name: "", waarden: "" } });

  // PDOK live counts per objecttype
  const [pdokCounts, setPdokCounts] = useState({});   // { typeId: { attrName: { waarde: count } } }
  const [loadingPdok, setLoadingPdok] = useState(false);
  const [pdokStatus, setPdokStatus] = useState(null);  // null | "loading" | "done" | "error"
  const [pdokN, setPdokN] = useState(0);

  const obj = OBJECTTYPEN.find(o => o.id === selected);
  const damoAttrs = DAMO_ATTRIBUTEN[selected] || [];
  const ctxAttrs = contextAttrs[selected] || DEFAULT_CONTEXT_ATTRS.map(a => ({ ...a, values: a.values.map(v => ({ ...v })) }));
  const rmAttrs = ramsAttrs[selected] || DEFAULT_RAMS_ATTRS.map(a => ({ ...a, values: a.values.map(v => ({ ...v })) }));

  // Haal live attribuutwaarden op van PDOK voor huidig objecttype
  async function reloadPdok() {
    const collectie = obj?.pdokCollectie || selected;
    setLoadingPdok(true);
    setPdokStatus("loading");
    setPdokN(0);

    try {
      // Haal max 200 objecten op voor statistische zekerheid
      let allFeatures = [];
      let url = `${PDOK_BASE_ATTR}/${collectie}/items?f=json&limit=200&bbox=${AGV_BBOX}`;
      let pages = 0;
      while (url && pages < 3) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const feats = (data.features || []).filter(f =>
          !f.properties?.waterbeheerder || f.properties.waterbeheerder === AGV_WB
        );
        allFeatures = allFeatures.concat(feats);
        const next = (data.links || []).find(l => l.rel === "next");
        url = next ? next.href : null;
        pages++;
      }

      const n = allFeatures.length;
      setPdokN(n);

      if (n === 0) { setPdokStatus("error"); setLoadingPdok(false); return; }

      // Tel waarden per attribuut
      const counts = {};
      const allKeys = new Set(allFeatures.flatMap(f => Object.keys(f.properties || {})));
      allKeys.forEach(k => {
        const tally = {};
        allFeatures.forEach(f => {
          const v = f.properties[k];
          if (v !== null && v !== undefined) {
            const vs = String(v);
            tally[vs] = (tally[vs] || 0) + 1;
          }
        });
        if (Object.keys(tally).length > 0) counts[k] = tally;
      });

      setPdokCounts(prev => ({ ...prev, [selected]: { n, counts } }));
      setPdokStatus("done");
    } catch(err) {
      console.error("PDOK reload fout:", err);
      setPdokStatus("error");
    }
    setLoadingPdok(false);
  }

  // Haal count op voor een attribuut+waarde uit PDOK live data
  function getLiveCount(attrName, waarde) {
    const typeData = pdokCounts[selected];
    if (!typeData) {
      // Fallback: diagnose JSON data
      const fallback = PDOK_FILL_DATA[selected]?.[attrName.toLowerCase()];
      return fallback ? null : null; // null = nog niet geladen
    }
    const attrKey = Object.keys(typeData.counts).find(
      k => k.toLowerCase() === attrName.toLowerCase()
    );
    if (!attrKey) return 0;
    const waardeLower = String(waarde).toLowerCase();
    const tally = typeData.counts[attrKey];
    // Zoek case-insensitief
    const match = Object.entries(tally).find(([k]) => k.toLowerCase() === waardeLower);
    return match ? match[1] : 0;
  }

  function getLiveTotal(attrName) {
    const typeData = pdokCounts[selected];
    if (!typeData) return null;
    const attrKey = Object.keys(typeData.counts).find(
      k => k.toLowerCase() === attrName.toLowerCase()
    );
    if (!attrKey) return 0;
    return Object.values(typeData.counts[attrKey]).reduce((s, v) => s + v, 0);
  }

  function isCluster(attrName) {
    return !!(clusterAttrs[selected] && clusterAttrs[selected].has(attrName));
  }
  function toggleCluster(attrName) {
    setClusterAttrs(s => {
      const set = new Set(s[selected] || []);
      set.has(attrName) ? set.delete(attrName) : set.add(attrName);
      return { ...s, [selected]: set };
    });
  }
  function getWaardeStatus(attrName, waarde) {
    return waardeStatus[`${selected}__${attrName}__${waarde}`] || null;
  }
  function setWaarde(attrName, waarde, status) {
    const key = `${selected}__${attrName}__${waarde}`;
    setWaardeStatus(s => ({ ...s, [key]: s[key] === status ? null : status }));
  }

  function addCustomAttr(as) {
    const val = newAttr[as];
    if (!val.name.trim()) return;
    const waarden = val.waarden.split(",").map(w => w.trim()).filter(Boolean);
    if (!waarden.length) return;
    const attr = { name: val.name.trim(), label: val.name.trim(), values: waarden.map(w => ({ waarde: w, count: null })) };
    if (as === "ctx") {
      setContextAttrs(s => ({ ...s, [selected]: [...(s[selected] || DEFAULT_CONTEXT_ATTRS), attr] }));
    } else {
      setRamsAttrs(s => ({ ...s, [selected]: [...(s[selected] || DEFAULT_RAMS_ATTRS), attr] }));
    }
    setNewAttr(s => ({ ...s, [as]: { name: "", waarden: "" } }));
  }

  // Tel clusterattributen en bulk-waarden voor samenvatting
  const clusterSet = clusterAttrs[selected] || new Set();
  const clusterCount = clusterSet.size;
  const bulkWaardeCount = Object.entries(waardeStatus).filter(([k, v]) => k.startsWith(selected + "__") && v === "bulk").length;

  function AttrBlok({ attr, bronLabel }) {
    const actief = isCluster(attr.name);
    return (
      <div style={{
        border: `1px solid ${actief ? "var(--accent)" : "var(--border)"}`,
        background: actief ? "rgba(0,200,255,0.04)" : "var(--panel2)",
        marginBottom: 6, transition: "all 0.2s"
      }}>
        {/* Attribuutregel — altijd zichtbaar */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", cursor: "pointer" }}
          onClick={() => toggleCluster(attr.name)}>
          <div style={{
            width: 16, height: 16, border: `1px solid ${actief ? "var(--accent)" : "var(--border)"}`,
            background: actief ? "var(--accent)" : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0, transition: "all 0.15s"
          }}>
            {actief && <span style={{ color: "var(--bg)", fontSize: 10, fontWeight: 700 }}>✓</span>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontSize: 12, fontWeight: actief ? 600 : 400, color: actief ? "var(--text)" : "var(--muted)" }}>
              {attr.label}
            </span>
            {attr.eenheid && (
              <span style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", marginLeft: 6 }}>
                [{attr.eenheid}]
              </span>
            )}
            <div style={{ display: "flex", gap: 4, marginTop: 2, flexWrap: "wrap" }}>
              {bronLabel && (
                <span style={{ fontFamily: "DM Mono", fontSize: 8, color: "var(--muted)", border: "1px solid var(--border)", padding: "1px 4px" }}>
                  {bronLabel}
                </span>
              )}
              {attr.model && (
                <span style={{ fontFamily: "DM Mono", fontSize: 8, color: "var(--accent)", border: "1px solid rgba(0,200,255,0.3)", padding: "1px 4px" }}>
                  {attr.model}
                </span>
              )}
              {attr.type && (
                <span style={{ fontFamily: "DM Mono", fontSize: 8, color: "var(--muted)", padding: "1px 4px" }}>
                  {attr.type}
                </span>
              )}
            </div>
          </div>
          {actief
            ? <span style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--accent)", letterSpacing: 1, flexShrink: 0 }}>CLUSTERATTRIBUUT</span>
            : <span style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", flexShrink: 0 }}>niet meegenomen</span>
          }
        </div>

        {/* Waarden — alleen zichtbaar als clusterattribuut aangeklikt */}
        {actief && (
          <div style={{ borderTop: "1px solid var(--border)", padding: "0 0 8px 0" }}>
            {/* Kolomkoppen */}
            <div style={{
              display: "grid", gridTemplateColumns: "1fr 80px 80px 100px",
              gap: 0, padding: "8px 14px 6px 42px",
              borderBottom: "1px solid var(--border)"
            }}>
              <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", letterSpacing: 1 }}>WAARDE</div>
              <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", letterSpacing: 1, textAlign: "right" }}>
                AANTAL {pdokCounts[selected] ? <span style={{ color: "var(--accent2)" }}>LIVE</span> : ""}
              </div>
              <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", letterSpacing: 1, textAlign: "center" }}>BULK</div>
              <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", letterSpacing: 1, textAlign: "center" }}>MAATWERK</div>
            </div>
            {/* Één regel per waarde */}
            {attr.values.map(v => {
              const status = getWaardeStatus(attr.name, v.waarde);
              const isBulk = status === "bulk";
              const isMaatwerk = status === "maatwerk";
              // Live count van PDOK, anders statische waarde
              const liveCount = getLiveCount(attr.name, v.waarde);
              const liveTotal = getLiveTotal(attr.name);
              const displayCount = liveCount !== null ? liveCount : v.count;
              const pct = liveCount !== null && liveTotal > 0
                ? Math.round((liveCount / liveTotal) * 100)
                : null;
              return (
                <div key={v.waarde} style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 80px 80px 100px",
                  gap: 0,
                  alignItems: "center",
                  padding: "9px 14px 9px 42px",
                  borderBottom: "1px solid rgba(30,58,95,0.5)",
                  background: isBulk
                    ? "rgba(0,255,157,0.06)"
                    : isMaatwerk
                    ? "rgba(255,77,109,0.06)"
                    : "transparent",
                  transition: "background 0.15s",
                }}>
                  {/* Waarde naam */}
                  <div style={{
                    fontSize: 12,
                    color: isBulk ? "var(--bulk)" : isMaatwerk ? "var(--nobulk)" : "var(--text)",
                    fontWeight: (isBulk || isMaatwerk) ? 600 : 400,
                  }}>{v.waarde}</div>

                  {/* Aantal + percentage */}
                  <div style={{ fontFamily: "DM Mono", fontSize: 11, textAlign: "right" }}>
                    {displayCount !== null && displayCount !== undefined ? (
                      <span style={{ color: liveCount !== null ? "var(--accent2)" : "var(--muted)" }}>
                        {displayCount}
                        {pct !== null && (
                          <span style={{ fontSize: 9, color: "var(--muted)", marginLeft: 3 }}>
                            {pct}%
                          </span>
                        )}
                      </span>
                    ) : (
                      <span style={{ color: "var(--muted)" }}>—</span>
                    )}
                  </div>

                  {/* Bulk knop */}
                  <div style={{ display: "flex", justifyContent: "center" }}>
                    <button
                      onClick={e => { e.stopPropagation(); setWaarde(attr.name, v.waarde, "bulk"); }}
                      style={{
                        width: 64, padding: "5px 0",
                        fontSize: 9, fontFamily: "DM Mono", letterSpacing: 1,
                        cursor: "pointer",
                        border: `1px solid var(--bulk)`,
                        background: isBulk ? "var(--bulk)" : "transparent",
                        color: isBulk ? "var(--bg)" : "var(--bulk)",
                        fontWeight: isBulk ? 700 : 400,
                        transition: "all 0.15s"
                      }}>
                      {isBulk ? "✓ BULK" : "BULK"}
                    </button>
                  </div>

                  {/* Maatwerk knop */}
                  <div style={{ display: "flex", justifyContent: "center" }}>
                    <button
                      onClick={e => { e.stopPropagation(); setWaarde(attr.name, v.waarde, "maatwerk"); }}
                      style={{
                        width: 80, padding: "5px 0",
                        fontSize: 9, fontFamily: "DM Mono", letterSpacing: 1,
                        cursor: "pointer",
                        border: `1px solid var(--nobulk)`,
                        background: isMaatwerk ? "var(--nobulk)" : "transparent",
                        color: isMaatwerk ? "var(--bg)" : "var(--nobulk)",
                        fontWeight: isMaatwerk ? 700 : 400,
                        transition: "all 0.15s"
                      }}>
                      {isMaatwerk ? "✓ MAATWERK" : "MAATWERK"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  function NieuwAttrForm({ as, label }) {
    return (
      <div style={{ marginTop: 12, padding: 12, border: "1px dashed var(--border)", background: "rgba(0,200,255,0.02)" }}>
        <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--accent)", letterSpacing: 2, marginBottom: 8 }}>
          + ATTRIBUUT TOEVOEGEN
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input
            placeholder="Attribuutnaam"
            value={newAttr[as].name}
            onChange={e => setNewAttr(s => ({ ...s, [as]: { ...s[as], name: e.target.value } }))}
            style={{ background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 10px", fontFamily: "DM Mono", fontSize: 11, flex: "1 1 140px" }}
          />
          <input
            placeholder="Waarden (komma-gescheiden)"
            value={newAttr[as].waarden}
            onChange={e => setNewAttr(s => ({ ...s, [as]: { ...s[as], waarden: e.target.value } }))}
            style={{ background: "var(--bg)", border: "1px solid var(--border)", color: "var(--text)", padding: "6px 10px", fontFamily: "DM Mono", fontSize: 11, flex: "2 1 200px" }}
          />
          <button
            onClick={() => addCustomAttr(as)}
            style={{ padding: "6px 16px", background: "none", border: "1px solid var(--accent)", color: "var(--accent)", fontFamily: "DM Mono", fontSize: 10, cursor: "pointer", letterSpacing: 1 }}
          >VOEG TOE</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: "grid", gridTemplateColumns: "240px 1fr", gap: 16 }}>
      {/* Objecttype selector */}
      <div className="tree-panel">
        <div className="sidebar-title">// Objecttype · IMWA</div>
        {OBJECTTYPEN.map(o => (
          <div
            key={o.id}
            className={`tree-node ${selected === o.id ? "selected" : ""}`}
            onClick={() => setSelected(o.id)}
          >
            <span style={{ color: TYPE_COLORS[o.id], marginRight: 6 }}>▸</span>
            {o.label}
            <span style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", float: "right" }}>
              {o.count ?? "—"}
            </span>
          </div>
        ))}
      </div>

      {/* Hoofdpaneel */}
      <div>
        {/* Header */}
        <div style={{ background: "var(--panel)", border: "1px solid var(--border)", padding: "16px 20px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: TYPE_COLORS[selected] }}>{obj?.label}</div>
          <div style={{ fontFamily: "DM Mono", fontSize: 10, color: "var(--muted)" }}>
            DAMO 2.6 · IMWA · {obj?.count ?? "?"} objecten in AGV
          </div>

          {/* Reload knop */}
          <button onClick={reloadPdok} disabled={loadingPdok} style={{
            background: "none",
            border: `1px solid ${pdokStatus === "done" ? "var(--accent2)" : pdokStatus === "error" ? "var(--danger)" : "var(--accent)"}`,
            color: pdokStatus === "done" ? "var(--accent2)" : pdokStatus === "error" ? "var(--danger)" : "var(--accent)",
            padding: "5px 12px", cursor: loadingPdok ? "wait" : "pointer",
            fontFamily: "DM Mono", fontSize: 9, letterSpacing: 1,
            opacity: loadingPdok ? 0.6 : 1,
          }}>
            {loadingPdok ? "⏳ LADEN..." :
             pdokStatus === "done" ? `✓ PDOK LIVE · n=${pdokN}` :
             pdokStatus === "error" ? "✗ FOUT · HERLAAD" :
             "↻ LAAD PDOK-AANTALLEN"}
          </button>

          {pdokStatus === "done" && (
            <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)" }}>
              {pdokN} objecten geanalyseerd · bbox AGV
            </div>
          )}

          <div style={{ marginLeft: "auto", display: "flex", gap: 16 }}>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "DM Mono", fontSize: 18, color: "var(--accent)" }}>{clusterCount}</div>
              <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)" }}>clusterattributen</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "DM Mono", fontSize: 18, color: "var(--bulk)" }}>{bulkWaardeCount}</div>
              <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)" }}>bulk-waarden</div>
            </div>
          </div>
        </div>

        {/* ─── As 1: Functionele as (DAMO) ─── */}
        <div style={{ background: "var(--panel)", border: "1px solid var(--border)", padding: 20, marginBottom: 16 }}>
          <div className="axis-title">Functionele as · DAMO 2.6-attributen</div>
          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", marginBottom: 14, letterSpacing: 1 }}>
            KLIK OP EEN ATTRIBUUT OM HET MEE TE NEMEN ALS CLUSTERATTRIBUUT · BRON: DAMO 2.6 HET WATERSCHAPSHUIS
          </div>
          {damoAttrs.length > 0 ? (
            <>
              {/* Watersysteem-attributen */}
              {damoAttrs.filter(a => a.model === "Watersysteem").length > 0 && (
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--accent)", letterSpacing: 2, marginBottom: 6, paddingLeft: 4 }}>
                    MODEL: WATERSYSTEEM
                  </div>
                  {damoAttrs.filter(a => a.model === "Watersysteem").map(attr => (
                    <AttrBlok key={attr.name} attr={attr} bronLabel="DAMO 2.6" />
                  ))}
                </div>
              )}
              {/* Keringen-attributen */}
              {damoAttrs.filter(a => a.model === "Keringen").length > 0 && (
                <div>
                  <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--warn)", letterSpacing: 2, marginBottom: 6, paddingLeft: 4, marginTop: 8 }}>
                    MODEL: KERINGEN
                  </div>
                  {damoAttrs.filter(a => a.model === "Keringen").map(attr => (
                    <AttrBlok key={attr.name} attr={attr} bronLabel="DAMO 2.6" />
                  ))}
                </div>
              )}
              {/* Overige attributen zonder model */}
              {damoAttrs.filter(a => !a.model).map(attr => (
                <AttrBlok key={attr.name} attr={attr} bronLabel="DAMO 2.6" />
              ))}
            </>
          ) : (
            <div style={{ fontFamily: "DM Mono", fontSize: 11, color: "var(--muted)", padding: 12 }}>
              Geen DAMO-attributen beschikbaar voor dit objecttype
            </div>
          )}
        </div>

        {/* ─── As 2: Context-as (zelf) ─── */}
        <div style={{ background: "var(--panel)", border: "1px solid var(--border)", padding: 20, marginBottom: 16 }}>
          <div className="axis-title">Context-as · Omgevingsattributen</div>
          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", marginBottom: 14, letterSpacing: 1 }}>
            ZELF GEDEFINIEERD · NIET UIT DAMO · VOEG TOE OF WIJZIG
          </div>
          {ctxAttrs.map(attr => <AttrBlok key={attr.name} attr={attr} bronLabel="eigen" />)}
          <NieuwAttrForm as="ctx" label="Context" />
        </div>

        {/* ─── As 3: RAMS-as (zelf) ─── */}
        <div style={{ background: "var(--panel)", border: "1px solid var(--border)", padding: 20 }}>
          <div className="axis-title">RAMS-as · Beheer & Betrouwbaarheid</div>
          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)", marginBottom: 14, letterSpacing: 1 }}>
            ZELF GEDEFINIEERD · NEN2767-4 · OBS/OBG · VOEG TOE OF WIJZIG
          </div>
          {rmAttrs.map(attr => <AttrBlok key={attr.name} attr={attr} bronLabel="eigen" />)}
          <NieuwAttrForm as="rams" label="RAMS" />
        </div>
      </div>
    </div>
  );
}

  const maxCount = Math.max(...BULK_MATRIX.map(c => c.count));

  return (
    <div className="analyse-layout">
      <div className="chart-row">
        {/* Context verdeling */}
        <div className="chart-panel">
          <div className="chart-title">// Context-as verdeling</div>
          <div className="chart-sub">Alle kunstwerken AGV naar omgevingstype</div>
          {CONTEXT_VERDELING.map(item => (
            <div className="bar-item" key={item.label}>
              <div className="bar-label">{item.label}</div>
              <div className="bar-track">
                <div className="bar-fill" style={{ width: `${item.pct}%`, background: item.color }} />
              </div>
              <div className="bar-value">{item.count}</div>
            </div>
          ))}
        </div>

        {/* RAMS verdeling */}
        <div className="chart-panel">
          <div className="chart-title">// RAMS-as verdeling</div>
          <div className="chart-sub">Alle kunstwerken AGV naar kritikaliteit</div>
          {RAMS_VERDELING.map(item => (
            <div className="bar-item" key={item.label}>
              <div className="bar-label">{item.label}</div>
              <div className="bar-track">
                <div className="bar-fill" style={{ width: `${item.pct}%`, background: item.color }} />
              </div>
              <div className="bar-value">{item.count}</div>
            </div>
          ))}

          <div style={{ marginTop: 24 }}>
            <div className="chart-title">// Objecttype verdeling</div>
            <div className="chart-sub">Aantallen per IMWA-type</div>
            {OBJECTTYPEN.map(o => {
              const totaalObjecten = OBJECTTYPEN.reduce((s, o) => s + (o.count || 0), 0);
              const pct = o.count && totaalObjecten ? Math.round((o.count / totaalObjecten) * 100) : 0;
              return (
                <div className="bar-item" key={o.id}>
                  <div className="bar-label">{o.label}</div>
                  <div className="bar-track">
                    <div className="bar-fill" style={{ width: `${pct}%`, background: TYPE_COLORS[o.id] }} />
                  </div>
                  <div className="bar-value">{o.count ?? "—"}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Bulk matrix */}
      <div className="chart-panel">
        <div className="chart-title">// Bulk-matrix · Context × RAMS</div>
        <div className="chart-sub">Aantal objecten per combinatie van assen — basis voor eisenset-clustering</div>

        <div style={{ display: "grid", gridTemplateColumns: `120px repeat(${RAMS_TYPEN.length}, 1fr)`, gap: 4, marginTop: 16 }}>
          <div className="matrix-cell matrix-header" />
          {RAMS_TYPEN.map(r => (
            <div key={r} className="matrix-cell matrix-header">{r}</div>
          ))}
          {CONTEXT_TYPEN.map(ctx => (
            <React.Fragment key={ctx}>
              <div className="matrix-cell matrix-header">{ctx}</div>
              {RAMS_TYPEN.map(rams => {
                const cell = BULK_MATRIX.find(c => c.context === ctx && c.rams === rams);
                const count = cell?.count || 0;
                const intensity = count / maxCount;
                const isSelected = selectedCell?.context === ctx && selectedCell?.rams === rams;
                return (
                  <div
                    key={rams}
                    className={`matrix-cell ${isSelected ? "selected" : ""}`}
                    style={{
                      background: `rgba(0,200,255,${intensity * 0.3})`,
                      borderColor: isSelected ? "var(--accent)" : "var(--border)",
                    }}
                    onClick={() => setSelectedCell(isSelected ? null : { context: ctx, rams })}
                  >
                    <div className="matrix-count">{count}</div>
                    <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "var(--muted)" }}>objecten</div>
                    {count > 500 && <div style={{ fontFamily: "DM Mono", fontSize: 8, color: "var(--bulk)", marginTop: 2 }}>BULK CLUSTER</div>}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>

        {selectedCell && (
          <div style={{ marginTop: 16, padding: 12, background: "var(--panel2)", border: "1px solid var(--accent)", fontFamily: "DM Mono", fontSize: 11 }}>
            <span style={{ color: "var(--accent)" }}>// CLUSTER: </span>
            <span className="tag context">{selectedCell.context}</span>
            <span className="tag rams">{selectedCell.rams}</span>
            <span style={{ color: "var(--muted)", marginLeft: 8 }}>
              → {BULK_MATRIX.find(c => c.context === selectedCell.context && c.rams === selectedCell.rams)?.count} objecten
              → {BULK_MATRIX.find(c => c.context === selectedCell.context && c.rams === selectedCell.rams)?.count > 500 ? "aanbevolen voor één bulk-eisenset" : "mogelijk maatwerk vereist"}
            </span>
          </div>
        )}
      </div>
    </div>
  );
}
